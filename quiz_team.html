<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미륵사지 단서 추론 퀴즈 — 팀 대항전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4f0;min-height:100vh;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}
.app{max-width:480px;margin:0 auto;padding:1.25rem 1.25rem 3rem;position:relative}

/* 공통 버튼 */
.btn{display:block;width:100%;padding:13px;font-size:15px;font-weight:600;border-radius:10px;cursor:pointer;font-family:inherit;border:1px solid #d4d2ca;background:#fff;color:#1a1a1a;text-align:center;transition:all .15s}
.btn:hover{background:#eceae4}
.btn:active{transform:scale(.98)}
.btn.blue{background:#2563eb;color:#fff;border-color:#2563eb}
.btn.blue:hover{background:#1d4ed8}
.btn.sm{padding:8px 14px;font-size:13px;width:auto}
.btn.ghost{background:transparent;color:#666;border-color:#d4d2ca}
.btn.ghost:hover{background:#eceae4}

/* 시작 화면 */
.hero{text-align:center;padding:1.5rem 0 1.25rem}
.hero-badge{display:inline-block;padding:4px 14px;background:#fef3c7;color:#b45309;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:.875rem}
.hero-title{font-size:22px;font-weight:700;margin-bottom:.375rem;color:#1a1a1a}
.hero-desc{font-size:13px;color:#666;line-height:1.7;margin-bottom:1.5rem}
.rule-box{background:#fff;border:1px solid #d4d2ca;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;font-size:13px;color:#555;line-height:1.7}

/* 팀 설정 */
.team-card{background:#fff;border:1.5px solid #d4d2ca;border-radius:10px;padding:1rem;margin-bottom:.75rem}
.team-card.a{border-color:#93c5fd}
.team-card.b{border-color:#fca5a5}
.tc-lbl{font-size:12px;font-weight:700;margin-bottom:6px}
.tc-lbl.a{color:#2563eb}
.tc-lbl.b{color:#dc2626}
.tc-input{width:100%;padding:10px 12px;font-size:15px;border:1px solid #d4d2ca;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none}
.tc-input:focus{border-color:#2563eb}

/* VS 바 */
.vs-bar{display:flex;align-items:center;gap:8px;padding:.875rem;background:#eceae4;border-radius:10px;margin-bottom:.875rem}
.ts{flex:1;text-align:center}
.ts-name{font-size:12px;font-weight:600;margin-bottom:3px}
.ts-name.a{color:#2563eb}
.ts-name.b{color:#dc2626}
.ts-score{font-size:32px;font-weight:700;line-height:1}
.ts-score.a{color:#2563eb}
.ts-score.b{color:#dc2626}
.vs-sep{font-size:14px;font-weight:700;color:#888}
.turn-pill{text-align:center;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:1rem}
.turn-pill.a{background:#dbeafe;color:#1d4ed8}
.turn-pill.b{background:#fee2e2;color:#991b1b}

/* 문제 카드 */
.q-stage{background:#fff;border:1px solid #d4d2ca;border-radius:12px;padding:1.25rem;margin-bottom:.75rem}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.q-counter{font-size:12px;color:#888}
.q-pts{font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px}
.q-pts.p1{background:#f5f4f0;color:#888}
.q-pts.p2{background:#fef3c7;color:#b45309}
.q-pts.p3{background:#fee2e2;color:#991b1b}

/* 단서 */
.clues-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.clue-box{border-radius:8px;overflow:hidden;border:1px solid #d4d2ca}
.clue-box-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;background:#f5f4f0}
.clue-box-hd:hover{background:#eceae4}
.clue-num{font-size:11px;font-weight:600;color:#888;background:#fff;padding:1px 7px;border-radius:10px;border:1px solid #d4d2ca}
.clue-title{font-size:13px;font-weight:500;color:#1a1a1a;flex:1;margin:0 8px}
.reveal-btn{font-size:11px;padding:3px 9px;border-radius:10px;cursor:pointer;border:1px solid #d4d2ca;background:#fff;color:#666;font-family:inherit;-webkit-appearance:none}
.reveal-btn:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.clue-body{padding:10px 12px;font-size:13px;line-height:1.65;color:#1a1a1a;background:#fff;border-top:1px solid #d4d2ca;display:none}
.clue-body.open{display:block}
.clue-cost{font-size:10px;color:#999;margin-top:4px}
.pts-warn{font-size:12px;color:#dc2626;text-align:center;padding:4px 0}

/* 답 입력 */
.ans-section{background:#f5f4f0;border-radius:8px;padding:10px 12px;margin-bottom:.75rem}
.ans-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600}
.ans-row{display:flex;gap:6px}
.ans-row input{flex:1;padding:11px 14px;font-size:16px;border:1.5px solid #d4d2ca;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;-webkit-appearance:none}
.ans-row input.inp-a{border-color:#2563eb}
.ans-row input.inp-b{border-color:#dc2626}
.ans-row input:focus{border-color:#2563eb}

/* 피드백 */
.feedback{text-align:center;padding:14px;border-radius:8px;margin-bottom:.75rem;font-size:14px;font-weight:600;display:none}
.feedback.show{display:block}
.feedback.correct{background:#dcfce7;color:#14532d}
.feedback.wrong{background:#fee2e2;color:#7f1d1d}

/* 점수 팝업 */
@keyframes pop-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* 결과 */
.result-wrap{display:flex;flex-direction:column;gap:.875rem}
.winner-box{text-align:center;padding:1.5rem;border-radius:12px}
.winner-box.a{background:#dbeafe;border:1.5px solid #93c5fd}
.winner-box.b{background:#fee2e2;border:1.5px solid #fca5a5}
.winner-box.tie{background:#f5f4f0;border:1px solid #d4d2ca}
.wb-lbl{font-size:12px;font-weight:700;margin-bottom:.375rem}
.wb-lbl.a{color:#1d4ed8}.wb-lbl.b{color:#991b1b}.wb-lbl.tie{color:#888}
.wb-name{font-size:24px;font-weight:700;color:#1a1a1a}
.score-detail{background:#fff;border:1px solid #d4d2ca;border-radius:12px;padding:1rem}
.sd-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:5px}
.sd-row.a{background:#dbeafe}.sd-row.b{background:#fee2e2}
.sd-name{font-size:13px;font-weight:600}
.sd-name.a{color:#1d4ed8}.sd-name.b{color:#991b1b}
.sd-pts{font-size:22px;font-weight:700}
.sd-pts.a{color:#2563eb}.sd-pts.b{color:#dc2626}
.ans-review{background:#fff;border:1px solid #d4d2ca;border-radius:12px;padding:1rem}
.rv-item{padding:10px 12px;border-radius:8px;margin-bottom:6px;font-size:12px;line-height:1.65}
.rv-item.a{background:#dbeafe;border-left:3px solid #2563eb}
.rv-item.b{background:#fee2e2;border-left:3px solid #dc2626}
.rv-item.skip{background:#f5f4f0;border-left:3px solid #d4d2ca}
.rv-q{font-weight:600;margin-bottom:2px;font-size:13px;color:#1a1a1a}
.rv-who{font-size:11px;color:#888}
.rv-exp{font-size:11px;color:#666;margin-top:3px;line-height:1.5}
</style>
</head>
<body>
<div class="app">

<!-- 시작 -->
<div id="pg-start">
  <div class="hero">
    <div class="hero-badge">탐정 퍼즐 · 팀 대항전</div>
    <div class="hero-title">단서를 조합하라!</div>
    <div class="hero-desc">단서를 하나씩 열어보며 답을 추론하세요.<br>단서를 적게 써서 맞힐수록 더 많은 점수!<br>오답이면 턴이 넘어갑니다.</div>
  </div>
  <div class="rule-box">
    💡 단서 1개만 보고 맞히면 <b>최대 점수</b><br>
    단서를 열 때마다 획득 가능 점수 1점 감소<br>
    오답 시 즉시 상대 팀으로 턴 이동
  </div>
  <div class="team-card a">
    <div class="tc-lbl a">팀 A 이름</div>
    <input class="tc-input" id="name-a" type="text" placeholder="예: 백제팀" maxlength="8"/>
  </div>
  <div class="team-card b">
    <div class="tc-lbl b">팀 B 이름</div>
    <input class="tc-input" id="name-b" type="text" placeholder="예: 신라팀" maxlength="8"/>
  </div>
  <div style="margin-top:.75rem">
    <button class="btn blue" onclick="startGame()">대결 시작!</button>
  </div>
</div>

<!-- 게임 -->
<div id="pg-game" style="display:none">
  <div class="vs-bar">
    <div class="ts">
      <div class="ts-name a" id="label-a">팀 A</div>
      <div class="ts-score a" id="score-a">0</div>
    </div>
    <div class="vs-sep">VS</div>
    <div class="ts">
      <div class="ts-name b" id="label-b">팀 B</div>
      <div class="ts-score b" id="score-b">0</div>
    </div>
  </div>
  <div class="turn-pill" id="turn-pill">팀 A의 차례</div>
  <div class="q-stage">
    <div class="q-meta">
      <div class="q-counter" id="q-counter">문제 1 / 8</div>
      <div class="q-pts p1" id="q-pts-badge">최대 5점</div>
    </div>
    <div class="clues-wrap" id="clues-wrap"></div>
    <div class="pts-warn" id="pts-warn" style="display:none"></div>
  </div>
  <div class="ans-section">
    <div class="ans-label">답 입력</div>
    <div class="ans-row">
      <input id="ans-inp" type="text" placeholder="추론한 답을 입력하세요" maxlength="20"/>
      <button class="btn sm blue" id="submit-btn">제출</button>
    </div>
  </div>
  <div class="feedback" id="feedback"></div>
  <div style="display:flex;gap:6px">
    <button class="btn ghost sm" id="skip-btn" style="flex:1">패스 (턴 넘기기)</button>
    <button class="btn ghost sm" id="end-btn" style="flex:1">게임 종료</button>
  </div>
</div>

<!-- 결과 -->
<div id="pg-result" style="display:none">
  <div class="result-wrap">
    <div class="winner-box" id="winner-box">
      <div class="wb-lbl" id="wb-lbl"></div>
      <div class="wb-name" id="wb-name"></div>
    </div>
    <div class="score-detail">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#1a1a1a">최종 점수</div>
      <div class="sd-row a"><div class="sd-name a" id="sd-a"></div><div class="sd-pts a" id="sdp-a"></div></div>
      <div class="sd-row b"><div class="sd-name b" id="sd-b"></div><div class="sd-pts b" id="sdp-b"></div></div>
    </div>
    <div class="ans-review">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#1a1a1a">문제별 정답</div>
      <div id="rv-list"></div>
    </div>
    <button class="btn blue" id="restart-btn">다시 하기</button>
  </div>
</div>

</div>

      {label:'단서 1',text:'나는 세계적으로 인정받은 문화유산이다.'},
      {label:'단서 2',text:'나는 한 나라가 아닌 여러 지역에 걸쳐 있다.'},
      {label:'단서 3',text:'나에 속한 곳은 총 8군데다. 충청도와 전라도에 걸쳐 있다.'},
      {label:'단서 4',text:'나는 2015년에 유네스코에 등재되었다. 고대 왕국의 이름을 담고 있다.'}
    ],
    accept:['백제역사유적지구','백제역사유적','백제유적지구'],
    answerFull:'백제역사유적지구',
    explain:'2015년 유네스코 세계유산으로 등재된 백제역사유적지구. 공주·부여·익산 3개 지역 8개소(미륵사지·왕궁리 유적 포함)가 포함됩니다.'
  }
];

var teamNames={a:'팀 A',b:'팀 B'};
var scores={a:0,b:0};
var turn='a';
var qIdx=0;
var openedClues=0;
var qResults=[];
var answered=false;

function startGame(){
  var na=document.getElementById('name-a').value.trim()||'팀 A';
  var nb=document.getElementById('name-b').value.trim()||'팀 B';
  teamNames={a:na,b:nb};
  scores={a:0,b:0};turn='a';qIdx=0;qResults=[];answered=false;
  document.getElementById('label-a').textContent=na;
  document.getElementById('label-b').textContent=nb;
  document.getElementById('score-a').textContent='0';
  document.getElementById('score-b').textContent='0';
  renderQ();
  show('pg-game');
}

function renderQ(){
  if(qIdx>=QUESTIONS.length){endGame();return;}
  var q=QUESTIONS[qIdx];
  openedClues=0;answered=false;
  document.getElementById('q-counter').textContent='문제 '+(qIdx+1)+' / '+QUESTIONS.length;
  updPts(q.maxPts);
  document.getElementById('pts-warn').style.display='none';
  var wrap=document.getElementById('clues-wrap');
  wrap.innerHTML='';
  q.clues.forEach(function(c,i){
    var box=document.createElement('div');box.className='clue-box';box.id='clue-'+i;
    var isFree=i===0;
    box.innerHTML='<div class="clue-box-hd" onclick="toggleClue('+i+')">'
      +'<span class="clue-num">'+c.label+'</span>'
      +'<span class="clue-title">'+(isFree?'첫 번째 단서 (무료)':'1점 차감')+'</span>'
      +'<button class="reveal-btn" onclick="event.stopPropagation();openClue('+i+')">'+(isFree?'공개':'열기')+'</button>'
      +'</div>'
      +'<div class="clue-body" id="clue-body-'+i+'">'+c.text
      +(i>0?'<div class="clue-cost">※ 이 단서를 보면 최대 점수에서 1점 감소</div>':'')
      +'</div>';
    wrap.appendChild(box);
  });
  setTimeout(function(){openClue(0);},200);
  document.getElementById('ans-inp').value='';
  document.getElementById('ans-inp').className='inp-'+turn;
  document.getElementById('feedback').className='feedback';
  updTurn();
}

function openClue(i){
  var q=QUESTIONS[qIdx];
  var body=document.getElementById('clue-body-'+i);
  if(!body||body.classList.contains('open'))return;
  if(i>0){
    var remaining=q.maxPts-openedClues;
    if(remaining<=1){
      var w=document.getElementById('pts-warn');
      w.textContent='단서를 더 열면 0점이 됩니다!';
      w.style.display='block';
    }
    openedClues++;
    updPts(q.maxPts-openedClues);
  }
  body.classList.add('open');
}
function toggleClue(i){
  var body=document.getElementById('clue-body-'+i);
  if(body&&!body.classList.contains('open'))openClue(i);
}
function updPts(pts){
  pts=Math.max(pts,0);
  var b=document.getElementById('q-pts-badge');
  b.textContent='최대 '+pts+'점';
  b.className='q-pts'+(pts>=4?' p1':pts>=2?' p2':' p3');
}
function calcPts(){return Math.max(QUESTIONS[qIdx].maxPts-openedClues,0);}

function submitAns(){
  if(answered)return;
  var q=QUESTIONS[qIdx];
  var inp=document.getElementById('ans-inp');
  var v=inp.value.trim();if(!v)return;
  var correct=q.accept.some(function(a){return v.replace(/\s/g,'')===a.replace(/\s/g,'');});
  var fb=document.getElementById('feedback');
  if(correct){
    answered=true;
    var pts=calcPts();
    scores[turn]+=pts;
    document.getElementById('score-'+turn).textContent=scores[turn];
    qResults.push({q:q,winner:turn,ptsEarned:pts,opened:openedClues+1});
    fb.textContent='정답! +'+pts+'점 획득 → '+teamNames[turn]+' '+scores[turn]+'점';
    fb.className='feedback show correct';
    popScore(pts,turn);
    var nextTurn=turn==='a'?'b':'a';
    setTimeout(function(){fb.className='feedback';qIdx++;turn=nextTurn;renderQ();},1800);
  }else{
    fb.textContent='오답! 턴이 '+teamNames[turn==='a'?'b':'a']+'으로 넘어갑니다.';
    fb.className='feedback show wrong';
    inp.value='';
    qResults.push({q:q,winner:null,ptsEarned:0,opened:openedClues+1,wrongAnswer:v});
    var nextTurn2=turn==='a'?'b':'a';
    setTimeout(function(){fb.className='feedback';turn=nextTurn2;updTurn();qIdx++;renderQ();},1500);
  }
}

function skipQ(){
  qResults.push({q:QUESTIONS[qIdx],winner:null,ptsEarned:0,opened:openedClues+1,skipped:true});
  turn=turn==='a'?'b':'a';qIdx++;renderQ();
}

function popScore(pts,t){
  var el=document.createElement('div');
  el.textContent='+'+pts;
  el.style.cssText='position:absolute;top:100px;'+(t==='a'?'left:30px':'right:30px')+';font-size:24px;font-weight:700;color:'+(t==='a'?'#2563eb':'#dc2626')+';pointer-events:none;z-index:99;animation:pop-up .9s ease forwards';
  document.querySelector('.app').appendChild(el);
  setTimeout(function(){el.remove();},1000);
}

function updTurn(){
  var pill=document.getElementById('turn-pill');
  pill.textContent=teamNames[turn]+'의 차례';
  pill.className='turn-pill '+turn;
  document.getElementById('ans-inp').className='inp-'+turn;
}

function endGame(){
  var a=scores.a,b=scores.b;
  var box=document.getElementById('winner-box');
  var lbl=document.getElementById('wb-lbl');
  var nm=document.getElementById('wb-name');
  if(a>b){box.className='winner-box a';lbl.className='wb-lbl a';lbl.textContent='승리';nm.textContent=teamNames.a;}
  else if(b>a){box.className='winner-box b';lbl.className='wb-lbl b';lbl.textContent='승리';nm.textContent=teamNames.b;}
  else{box.className='winner-box tie';lbl.className='wb-lbl tie';lbl.textContent='무승부';nm.textContent=teamNames.a+' · '+teamNames.b;}
  document.getElementById('sd-a').textContent=teamNames.a;
  document.getElementById('sd-b').textContent=teamNames.b;
  document.getElementById('sdp-a').textContent=a+'점';
  document.getElementById('sdp-b').textContent=b+'점';
  document.getElementById('rv-list').innerHTML=QUESTIONS.slice(0,qResults.length).map(function(q,i){
    var r=qResults[i];
    var cls=r.winner?'rv-item '+r.winner:'rv-item skip';
    var who=r.winner?(teamNames[r.winner]+' +'+r.ptsEarned+'점 (단서 '+r.opened+'개)'):r.skipped?'패스':'오답 처리';
    return '<div class="'+cls+'">'
      +'<div class="rv-q">'+q.answerFull+'</div>'
      +'<div class="rv-who">'+who+'</div>'
      +'<div class="rv-exp">'+q.explain+'</div>'
      +'</div>';
  }).join('');
  show('pg-result');
}

function show(id){
  ['pg-start','pg-game','pg-result'].forEach(function(p){
    document.getElementById(p).style.display=p===id?'block':'none';
  });
}

/* 이벤트 바인딩 */
document.getElementById('submit-btn').addEventListener('click',submitAns);
document.getElementById('skip-btn').addEventListener('click',skipQ);
document.getElementById('end-btn').addEventListener('click',function(){if(confirm('게임을 끝낼까요?'))endGame();});
document.getElementById('restart-btn').addEventListener('click',function(){show('pg-start');});
document.getElementById('ans-inp').addEventListener('keydown',function(e){if(e.key==='Enter')submitAns();});
document.getElementById('name-a').addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});
document.getElementById('name-b').addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});
</script>
</body>
</html>
